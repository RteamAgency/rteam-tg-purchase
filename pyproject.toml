[tool.ruff]
line-length = 100
target-version = "py310"
extend-exclude = [
    "rteam_tg_purchase/__pycache__",
]

[tool.ruff.lint]
select = ["E", "F", "W", "B", "I", "UP"]
ignore = [
    "E501",  # line length enforced by formatter, not linter
    "B008",  # function calls in default args (Odoo lambda defaults)
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]                # Odoo re-exports
"rteam_tg_purchase/tests/__init__.py" = ["F401"]
"rteam_tg_purchase/__manifest__.py" = ["B018"]
