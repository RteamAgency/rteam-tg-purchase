name: ci

on:
  push:
    branches: [main, "17.0", "18.0", "19.0"]
  pull_request:
    branches: [main, "17.0", "18.0", "19.0"]

env:
  MODULES: rteam_tg_purchase

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: Ruff check
        run: ruff check ${{ env.MODULES }}

      - name: Ruff format check
        run: ruff format --check ${{ env.MODULES }}

  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate manifests parse + have required keys
        run: |
          python <<'PY'
          import ast, glob
          required = {"name", "version", "license", "author", "depends", "data", "category"}
          for path in sorted(glob.glob("rteam_tg_*/__manifest__.py")):
              tree = ast.parse(open(path).read())
              assert isinstance(tree.body[0], ast.Expr), path
              d = ast.literal_eval(tree.body[0].value)
              missing = required - set(d.keys())
              assert not missing, f"{path}: missing {missing}"
              assert d["license"] in ("LGPL-3", "OPL-1", "AGPL-3"), f"{path}: license {d['license']}"
              print(f"OK {path} v{d['version']}")
          PY

      - name: Validate XML data files parse
        run: |
          python <<'PY'
          import xml.etree.ElementTree as ET
          import glob
          for path in sorted(glob.glob("rteam_tg_*/**/*.xml", recursive=True)):
              try:
                  ET.parse(path)
                  print(f"OK {path}")
              except ET.ParseError as e:
                  print(f"FAIL {path}: {e}")
                  raise
          PY

  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile all .py files
        run: python -m compileall -q ${{ env.MODULES }}
